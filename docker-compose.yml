services:
  web:
    build: .
    command: gunicorn fileconverter.wsgi:application --bind 0.0.0.0:8000
    env_file: .env
    environment:
      RUN_MIGRATIONS: "1"
      DATABASE_URL: postgres://fileconverter:fileconverter@postgres:5432/fileconverter
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: fileconverter
      POSTGRES_USER: fileconverter
      POSTGRES_PASSWORD: fileconverter
      REDIS_URL: redis://redis:6379/0
      FILECONVERTER_USE_REDIS_CACHE: "True"
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/ops/health/', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
  worker:
    build: .
    # --max-tasks-per-child recycles workers (bounds memory leaks from native converters).
    # ACKS_LATE + REJECT_ON_WORKER_LOST (settings) re-queue in-flight jobs on shutdown.
    command: celery -A fileconverter worker -l info -Q default --max-tasks-per-child=100
    env_file: .env
    environment:
      DATABASE_URL: postgres://fileconverter:fileconverter@postgres:5432/fileconverter
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: fileconverter
      POSTGRES_USER: fileconverter
      POSTGRES_PASSWORD: fileconverter
      REDIS_URL: redis://redis:6379/0
      FILECONVERTER_USE_REDIS_CACHE: "True"
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
    # Give in-flight conversions time to finish (SIGTERM warm shutdown) before SIGKILL.
    stop_grace_period: 60s
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "fileconverter", "inspect", "ping", "-d", "celery@$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
  beat:
    build: .
    command: celery -A fileconverter beat -l info
    env_file: .env
    environment:
      DATABASE_URL: postgres://fileconverter:fileconverter@postgres:5432/fileconverter
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: fileconverter
      POSTGRES_USER: fileconverter
      POSTGRES_PASSWORD: fileconverter
      REDIS_URL: redis://redis:6379/0
      FILECONVERTER_USE_REDIS_CACHE: "True"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fileconverter
      POSTGRES_USER: fileconverter
      POSTGRES_PASSWORD: fileconverter
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fileconverter -d fileconverter"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
