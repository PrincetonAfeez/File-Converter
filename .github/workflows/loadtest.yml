name: Load test

# Manual / scheduled load test against a STAGING target (never production).
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Staging base URL
        required: true
      vus:
        description: Virtual users
        default: "20"
      duration:
        description: Test duration
        default: "2m"

jobs:
  k6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6
      - name: Run k6
        env:
          K6_USER: ${{ secrets.LOADTEST_USER }}
          K6_PASS: ${{ secrets.LOADTEST_PASS }}
        run: |
          k6 run \
            -e BASE_URL="${{ inputs.base_url }}" \
            -e USER="$K6_USER" -e PASS="$K6_PASS" \
            -e VUS="${{ inputs.vus }}" -e DURATION="${{ inputs.duration }}" \
            loadtest/k6-convert.js
